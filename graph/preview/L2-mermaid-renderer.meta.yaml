graph: L2-mermaid-renderer.mermaid
level: 2
parent_node: MermaidRenderer
parent_graph: L1-preview.mermaid
description: "MermaidRenderer의 구현 상세. mermaid 텍스트를 받아 구문 검증, 테마 적용, mermaid.js 초기화를 거쳐 SVG로 렌더링하여 Webview에 주입한다."
last_updated: 2026-03-07

nodes:
  TextReceiver:
    owner: "@devman-kr"
    status: planned
    description: "PreviewPanel 또는 Viewer로부터 mermaid 원본 텍스트를 수신한다."

  SyntaxValidator:
    owner: "@devman-kr"
    status: planned
    description: "mermaid.parse()를 호출하여 텍스트의 구문 유효성을 사전 검증한다. 무효 시 오류 메시지를 추출한다."

  ThemeApplier:
    owner: "@devman-kr"
    status: planned
    description: "VSCode의 현재 색상 테마(다크/라이트)를 감지하여 mermaid 테마(dark, default)를 결정한다."

  MermaidInit:
    owner: "@devman-kr"
    status: planned
    description: "mermaid.initialize({ theme, startOnLoad: false })를 호출하여 렌더링 엔진을 초기화한다."

  SvgRenderer:
    owner: "@devman-kr"
    status: planned
    description: "mermaid.render(id, text)를 호출하여 mermaid 텍스트를 SVG 문자열로 변환한다."

  DomInjector:
    owner: "@devman-kr"
    status: planned
    description: "렌더링된 SVG 문자열을 Webview의 DOM 컨테이너에 innerHTML로 삽입한다."

  ErrorRenderer:
    owner: "@devman-kr"
    status: planned
    description: "구문 오류 또는 렌더링 실패 시 에러 메시지를 Webview에 사용자 친화적으로 표시한다."

edges:
  - from: TextReceiver
    to: SyntaxValidator
    type: requires
    contract: "mermaid 원본 텍스트 문자열 전달"
  - from: SyntaxValidator
    to: ThemeApplier
    label: "구문 유효 확인"
  - from: SyntaxValidator
    to: ErrorRenderer
    label: "구문 오류 메시지 전달"
  - from: ThemeApplier
    to: MermaidInit
    type: requires
    contract: "{ theme: 'dark' | 'default' } 설정 전달"
  - from: MermaidInit
    to: SvgRenderer
    type: requires
    contract: "초기화된 mermaid 인스턴스로 렌더링 실행"
  - from: SvgRenderer
    to: DomInjector
    type: requires
    contract: "SVG 문자열 전달"
  - from: SvgRenderer
    to: ErrorRenderer
    label: "렌더링 실패 시 에러 전달"
