graph: L2-title-bar-icon.mermaid
level: 2
parent_node: TitleBarIcon
parent_graph: L1-preview.mermaid
description: "TitleBarIcon의 구현 상세. package.json의 editor/title contribution으로 등록된 아이콘이 gdd.mermaidActive 컨텍스트에 따라 표시/숨김되고, 클릭 시 프리뷰를 여는 커맨드를 실행한다."
last_updated: 2026-03-07

nodes:
  ContributionDef:
    owner: "@devman-kr"
    status: completed
    description: "package.json의 contributes.menus['editor/title']에 GDD 프리뷰 아이콘 메뉴 항목을 정의한다."

  WhenClause:
    owner: "@devman-kr"
    status: completed
    description: "when 조건식 'gdd.mermaidActive'을 평가하여 아이콘 표시 여부를 결정한다."

  IconRender:
    owner: "@devman-kr"
    status: completed
    description: "조건 충족 시 에디터 타이틀바 우측에 GDD 그래프 아이콘을 렌더링한다."

  CommandDispatch:
    owner: "@devman-kr"
    status: completed
    description: "아이콘 클릭 시 vscode.commands.registerCommand로 등록된 gdd.openPreview 커맨드를 실행한다."
    source_file: "src/preview/previewPanel.ts"

  PreviewTrigger:
    owner: "@devman-kr"
    status: completed
    description: "현재 활성 에디터의 .mermaid 파일 URI를 PreviewPanel 생성 함수에 전달한다."
    source_file: "src/preview/previewPanel.ts"

  IconHide:
    owner: "@devman-kr"
    status: completed
    description: "gdd.mermaidActive가 false일 때 아이콘이 타이틀바에 표시되지 않는다."

edges:
  - from: ContributionDef
    to: WhenClause
    label: "메뉴 항목과 when 조건 연결"
  - from: WhenClause
    to: IconRender
    label: "gdd.mermaidActive === true"
  - from: WhenClause
    to: IconHide
    label: "gdd.mermaidActive === false"
  - from: IconRender
    to: CommandDispatch
    label: "사용자 클릭 이벤트"
  - from: CommandDispatch
    to: PreviewTrigger
    type: requires
    contract: "활성 에디터의 vscode.Uri 전달"
